shared:
  image: golang:1.22.1
  environment:
    GO111MODULE: on
    GOPATH: /sd/workspace

jobs:
  build:
    requires: [~pr, ~commit]
    steps:
      - init: cd $GOPATH/src/github.com/AthenZ/k8s-athenz-istio-auth
      - build: go build -v -race ./...
      - fmt: |
          gofmt -d . > /tmp/gofmt_diff
          [ ! -s /tmp/gofmt_diff ] || { echo "Code not properly formatted by gofmt"; cat /tmp/gofmt_diff; exit 1; }
      - vet: go vet ./...
      - test: go test -v -race ./...
      - k8s: |
          cd $GOPATH/src
          mkdir -p k8s.io
          cd k8s.io
          git clone https://github.com/kubernetes/kubernetes.git
          cd kubernetes
          git checkout release-1.21
      - k8s-openapi:  | 
          cd $GOPATH/src/k8s.io/kubernetes/vendor/k8s.io/kube-openapi
          go mod init
      - integration-test: | 
          echo "Current Directory:"
          pwd
          echo "Contents of Current Directory:"
          ls
          echo "Environment Information:"
          env
          cd $GOPATH/src/github.com/AthenZ/k8s-athenz-istio-auth/test/integration
          echo "Changed Directory to Integration Tests Directory:"
          pwd
          ls
          go test -v ./...